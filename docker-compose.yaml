version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: smail_laravel_app
    ports:
      - "8085:80"
    env_file:
      - docker/.env.docker
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/var/www

  postgres:
    image: postgres:15
    container_name: smail_postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: staging
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: smail_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  idler-worker:
    build:
      context: .
      dockerfile: idler/Dockerfile
    container_name: smail_idler_worker
    restart: unless-stopped
    env_file:
      - docker/.env.docker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PHP_API_URL=http://app:80/api
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
      - ACCOUNT_REFRESH_INTERVAL=3600000
    depends_on:
      - redis
      - app
    networks:
      - default

volumes:
  pgdata:
  redis_data:
